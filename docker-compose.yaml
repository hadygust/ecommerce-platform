version: "3.9"

volumes:
  ecommerce-db-data:
  notification-db-data:

services:
  ecommerce-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${ECOMMERCE_DB_NAME}
      POSTGRES_USER: ${ECOMMERCE_DB_USER}
      POSTGRES_PASSWORD: ${ECOMMERCE_DB_PASSWORD}
    ports: [ "5432:5432" ]
    volumes: [ ecommerce-db-data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "ecom_user" ]
      interval: 5s
      retries: 10

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    ports: [ "5433:5432" ]
    volumes: [ notification-db-data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "notif_user" ]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"         # management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      retries: 10